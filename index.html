  </head>
  <body>
    <div id="root"></div>
    <script>
      // NFC cards/tags write bare /tools/<cardKeyHash> and /tag/<uid> URLs;
      // rewrite into the hash router so a direct deep-link load resolves.
      (function () {
        var p = window.location.pathname;
        if (p !== '/' && !window.location.hash) {
          window.location.replace('/#' + p + window.location.search);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
